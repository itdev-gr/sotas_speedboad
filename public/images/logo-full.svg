<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&amp;display=swap');
    </style>
  </defs>

  <!-- Crown -->
  <g fill="#D4A017">
    <!-- Crown base band -->
    <rect x="135" y="68" width="130" height="14" rx="2"/>
    <!-- Crown left spike -->
    <polygon points="140,68 155,22 170,58 170,68"/>
    <!-- Crown center spike -->
    <polygon points="182,68 200,8 218,68"/>
    <!-- Crown right spike -->
    <polygon points="230,68 245,22 260,68"/>
    <!-- Crown jewels (circles on tips) -->
    <circle cx="155" cy="20" r="6"/>
    <circle cx="200" cy="6" r="7"/>
    <circle cx="245" cy="20" r="6"/>
  </g>

  <!-- Shield -->
  <g>
    <!-- Shield outer shape -->
    <path d="M108,88 L108,250 Q108,310 200,360 Q292,310 292,250 L292,88 Z" fill="none" stroke="#D4A017" stroke-width="10"/>
    <!-- Shield inner border -->
    <path d="M122,100 L122,246 Q122,300 200,344 Q278,300 278,246 L278,100 Z" fill="none" stroke="#D4A017" stroke-width="3"/>
  </g>

  <!-- STZ Text -->
  <text x="200" y="215" text-anchor="middle" font-family="'Cinzel', 'Times New Roman', serif" font-weight="800" font-size="80" fill="#D4A017" letter-spacing="6">STZ</text>

  <!-- Wave lines -->
  <g stroke="#D4A017" fill="none" stroke-width="3.5" stroke-linecap="round">
    <path d="M155,260 Q167,250 179,260 Q191,270 203,260 Q215,250 227,260 Q239,270 248,260"/>
    <path d="M160,275 Q172,265 184,275 Q196,285 208,275 Q220,265 232,275 Q240,282 245,275"/>
    <path d="M168,289 Q178,281 188,289 Q198,297 208,289 Q218,281 228,289"/>
  </g>

  <!-- SOTA TRAVEL text -->
  <text x="200" y="415" text-anchor="middle" font-family="'Cinzel', 'Times New Roman', serif" font-weight="900" font-size="48" fill="#D4A017" letter-spacing="5">SOTA TRAVEL</text>

  <!-- ZAKYNTHOS text -->
  <text x="200" y="458" text-anchor="middle" font-family="'Cinzel', 'Times New Roman', serif" font-weight="700" font-size="32" fill="#D4A017" letter-spacing="4">ZAKYNTHOS</text>

  <!-- VIP CRUISE text -->
  <text x="200" y="495" text-anchor="middle" font-family="'Cinzel', 'Times New Roman', serif" font-weight="700" font-size="24" fill="#D4A017" letter-spacing="3">- VIP CRUISE -</text>
</svg>
