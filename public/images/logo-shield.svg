<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 310" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&amp;display=swap');
    </style>
  </defs>

  <!-- Crown -->
  <g fill="#D4A017">
    <!-- Crown base band -->
    <rect x="45" y="58" width="130" height="14" rx="2"/>
    <!-- Crown left spike -->
    <polygon points="50,58 65,12 80,48 80,58"/>
    <!-- Crown center spike -->
    <polygon points="92,58 110,0 128,58"/>
    <!-- Crown right spike -->
    <polygon points="140,58 155,12 170,58"/>
    <!-- Crown jewels (circles on tips) -->
    <circle cx="65" cy="10" r="6"/>
    <circle cx="110" cy="0" r="7"/>
    <circle cx="155" cy="10" r="6"/>
  </g>

  <!-- Shield -->
  <g>
    <!-- Shield outer shape -->
    <path d="M18,78 L18,195 Q18,255 110,305 Q202,255 202,195 L202,78 Z" fill="none" stroke="#D4A017" stroke-width="10"/>
    <!-- Shield inner border -->
    <path d="M32,90 L32,191 Q32,245 110,289 Q188,245 188,191 L188,90 Z" fill="none" stroke="#D4A017" stroke-width="3"/>
  </g>

  <!-- STZ Text -->
  <text x="110" y="185" text-anchor="middle" font-family="'Cinzel', 'Times New Roman', serif" font-weight="800" font-size="72" fill="#D4A017" letter-spacing="5">STZ</text>

  <!-- Wave lines -->
  <g stroke="#D4A017" fill="none" stroke-width="3.5" stroke-linecap="round">
    <path d="M65,210 Q77,200 89,210 Q101,220 113,210 Q125,200 137,210 Q149,220 158,210"/>
    <path d="M70,225 Q82,215 94,225 Q106,235 118,225 Q130,215 142,225 Q150,232 155,225"/>
    <path d="M78,239 Q88,231 98,239 Q108,247 118,239 Q128,231 138,239"/>
  </g>
</svg>
